# ---------------------------------------------------------------
# UHQ Panel OS — déploiement Coolify
#
# Aucune variable d'env requise : tout se configure via le panel.
#   * Base de données  → écran de configuration au 1er démarrage
#   * JWT secret       → généré automatiquement au 1er boot
#   * Paramètres app   → panel admin (Settings)
#
# Surfaces :
#   * API REST + panel sur 8000  — exposé via Coolify Traefik (HTTPS)
#   * Proxy TCP sur 990          — mappé directement à l'hôte
# ---------------------------------------------------------------

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped

    # --- Port mapping ---------------------------------------------------------
    # The HTTP API does NOT need a host port — Coolify's Traefik reaches the
    # container on the internal Docker network. Only the raw TCP proxy is
    # published to the VPS network interface.
    ports:
      - "990:990/tcp"

    # --- File-descriptor headroom --------------------------------------------
    # The engine holds thousands of concurrent sockets during racing.
    ulimits:
      nofile:
        soft: 200000
        hard: 200000

    # --- Environment ---------------------------------------------------------
    # Seules les valeurs d'infra qui ne peuvent pas être stockées en base
    # sont définies ici. Tout le reste se configure via le panel admin.
    environment:
      - PROXY_HOST=0.0.0.0
      - PROXY_PORT=990
      - API_PORT=8000
      - DATA_DIR=/app/data
      - TZ=Europe/Paris

    # Persistance de la config runtime (lien base saisi à la main si DATABASE_URL vide).
    # Bind mount vers un chemin fixe sur le VPS — survive aux redéploiements Coolify
    # qui préfixent les volumes nommés et perdent les données entre projets.
    volumes:
      - /data/uhq-panel:/app/data

    # --- Traefik labels (manual) ---------------------------------------------
    # We tell Traefik EXPLICITLY:
    #   - There's a service named `uhq-api` on the container's port 8000.
    #   - There's a router that catches Host=`api.82.22.2.154.sslip.io`
    #     and routes to that service.
    # Coolify's auto-generated labels (if any) are bypassed by setting a
    # higher priority on our router.
    #
    # If your VPS IP ever changes, update the Host rule below to match.
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.uhq-api.loadbalancer.server.port=8000"
      - "traefik.http.routers.uhq-api.rule=Host(`uhq.bloume.fr`)"
      - "traefik.http.routers.uhq-api.entrypoints=http"
      - "traefik.http.routers.uhq-api.service=uhq-api"
      - "traefik.http.routers.uhq-api.priority=100"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

    # --- Logging --------------------------------------------------------------
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

# Pas de volume nommé — bind mount défini inline dans le service.
