# ---------------------------------------------------------------
# UHQ Panel OS — tout-en-un, zéro configuration requise
#
# Fonctionne en local ET sur Coolify sans rien modifier.
#
#   Local :
#     docker compose up -d  →  http://localhost:8000  ·  TCP :990
#
#   Coolify :
#     Importez ce fichier, configurez le domaine dans l'interface
#     Coolify (FQDN), c'est tout. Pas de labels à éditer.
#     Le port 8000 est exposé en interne pour Traefik.
#     Le port 990 (proxy TCP) est mappé directement sur l'hôte.
#
# JWT secret     → généré automatiquement au 1er boot
# Mot de passe   → défini pendant le wizard de setup
# Port proxy     → modifiable dans Settings → publicProxyPort
# ---------------------------------------------------------------

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: uhq
      POSTGRES_PASSWORD: uhqpanel_internal
      POSTGRES_DB: uhqpanel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uhq -d uhqpanel"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000/tcp"   # panel + API — Traefik/reverse-proxy → ce port
      - "990:990/tcp"     # proxy TCP brut — mappé directement sur l'hôte
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    environment:
      DATABASE_URL: postgresql://uhq:uhqpanel_internal@db:5432/uhqpanel
      DATA_DIR: /app/data
      TZ: Europe/Paris
    volumes:
      - appdata:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

# Noms explicites : Coolify ne les préfixe pas → données persistées
# même après un redéploiement ou un changement de nom de projet.
volumes:
  pgdata:
    name: uhq-panel-pgdata
  appdata:
    name: uhq-panel-appdata
