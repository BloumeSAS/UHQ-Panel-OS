# ---------------------------------------------------------------
# UHQ Panel OS — tout-en-un, zéro configuration requise
#
# Fonctionne en local ET sur Coolify sans rien modifier.
#
#   Local    :  docker compose up -d  →  http://localhost:8000  ·  TCP :990
#   Coolify  :  importez ce fichier, configurez le FQDN dans l'interface
#               Coolify → Traefik route vers le port 8000 en interne.
#
# JWT secret   → généré automatiquement au 1er boot
# Mot de passe → défini pendant le wizard de setup
# ---------------------------------------------------------------

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: uhq
      POSTGRES_PASSWORD: uhqpanel_internal
      POSTGRES_DB: uhqpanel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uhq -d uhqpanel"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Port 990 : proxy TCP — bindé sur l'hôte (accessible depuis l'extérieur).
      # Port 8000 : PAS de mapping hôte — Traefik (Coolify) y accède via
      # le réseau Docker interne. En local sans Traefik : décommentez :
      # - "8000:8000/tcp"
      - "990:990/tcp"
    expose:
      - "8000"
    labels:
      - "traefik.http.services.uhq-panel-app.loadbalancer.server.port=8000"
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    environment:
      DATABASE_URL: postgresql://uhq:uhqpanel_internal@db:5432/uhqpanel
      DATA_DIR: /app/data
      TZ: Europe/Paris
      PROXY_PORT: "990"
      API_PORT: "8000"
    volumes:
      - appdata:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

# Noms explicites — Coolify ne préfixe pas les volumes avec un name: absolu.
volumes:
  pgdata:
    name: uhq-panel-pgdata
  appdata:
    name: uhq-panel-appdata
