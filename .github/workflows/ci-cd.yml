name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build API + Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install API dependencies
        working-directory: api
        run: npm install

      - name: Build API
        working-directory: api
        run: npm run build

      - name: Install Web dependencies
        working-directory: web
        run: npm install

      - name: Build Web
        working-directory: web
        run: npm run build

  docker:
    name: Build and publish Docker image
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/uhq-panel-os
        run: |
          TAGS="--tag $IMAGE_NAME:latest --tag $IMAGE_NAME:${GITHUB_SHA}"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAGS="$TAGS --tag $IMAGE_NAME:${GITHUB_REF_NAME}"
          fi
          docker buildx build --platform linux/amd64,linux/arm64 $TAGS --push .
